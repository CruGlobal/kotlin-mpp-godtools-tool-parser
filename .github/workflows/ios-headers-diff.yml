name: iOS Framework Headers Diff

on:
  pull_request:
    branches: [main, feature/*]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-headers-diff:
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Generate current Framework headers
        run: ./gradlew :publishing:spm:linkReleaseFrameworkIosArm64 --scan
      - name: Copy current Framework headers
        run: |
          mkdir -p $GITHUB_WORKSPACE/diff/head
          cp publishing/spm/build/bin/iosArm64/releaseFramework/GodToolsShared.framework/Headers/*.h diff/head
      - name: Checkout base
        run: git checkout $GITHUB_BASE_REF
      - name: Generate base Framework headers
        run: ./gradlew clean :publishing:spm:linkReleaseFrameworkIosArm64 --scan
      - name: Copy base Framework headers
        run: |
          mkdir -p $GITHUB_WORKSPACE/diff/base
          cp publishing/spm/build/bin/iosArm64/releaseFramework/GodToolsShared.framework/Headers/*.h diff/base
      - id: diff
        uses: int128/diff-action@v2
        with:
          base: "${{ github.workspace }}/diff/base"
          head: "${{ github.workspace }}/diff/head"
          label: ios-framework-headers-changed
      - uses: int128/comment-action@v1
        with:
          update-if-exists: replace
          post: |
            ## iOS Framework headers
            ${{ steps.diff.outputs.comment-body || 'No changes' }}
