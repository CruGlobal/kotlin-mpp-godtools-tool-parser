name: Build Library

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main, feature/*]
  workflow_dispatch:
    inputs:
      triggerRelease:
        description: 'Release Build'
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.triggerRelease || false }}
  cancel-in-progress: true

permissions:
  id-token: write # Required for OIDC for npm publish
  contents: write # Required for creating a new tag when releasing

env:
  ORG_GRADLE_PROJECT_releaseBuild: ${{ github.event_name == 'workflow_dispatch' && inputs.triggerRelease && github.ref == 'refs/heads/main' }}
  ORG_GRADLE_PROJECT_versionSuffix: >-
    ${{
      (github.event_name == 'pull_request' && format('PR{0}', github.event.pull_request.number)) ||
      ''
    }}

jobs:
  build:
    name: Build
    # run on mac so iOS compilation is executed as well
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Build
        run: ./gradlew assemble --scan

  check_metadata:
    name: Check Publication Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Check Publication Metadata
        run: ./gradlew generateMetadataFileForKotlinMultiplatformPublication --scan

  ktlint:
    name: Ktlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Ktlint
        run: ./gradlew :build-logic:ktlintCheck ktlintCheck --scan
      - name: Archive ktlint results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ktlint-results
          path: "**/build/reports/ktlint/"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Lint
        run: ./gradlew lint --scan

  android_tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          lfs: 'true'
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Cache Maven
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ github.sha }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Run Android Unit Tests
        run: ./gradlew test verifyPaparazzi koverXmlReportRelease --scan --no-build-cache
      - name: Codecov
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-unit-test-results
          path: |
            **/build/paparazzi/failures/
            **/build/reports/tests/
      - name: Archive kover results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kover-results
          path: "**/build/reports/kover/"

  ios_tests:
    name: iOS Unit Tests
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Run iOS Unit Tests
        run: ./gradlew iosSimulatorArm64Test --scan

  js_tests:
    name: JS Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Run JS Unit Tests
        run: ./gradlew jsTest --scan
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: js-unit-test-results
          path: "**/build/reports/tests/"

  lint_ios_podspec:
    name: Lint iOS Podspec
    runs-on: macos-26
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Create podspec
        run: ./gradlew podspec
      - name: Lint podspec
        run: bundle exec pod spec lint *.podspec --allow-warnings --verbose
        env:
          # HACK: Disable Git LFS for this step due to issues with GHA being able to fetch LFS files
          GIT_LFS_SKIP_SMUDGE: 1

  check_version:
    name: Check Version is Unreleased
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.tag_name.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Find Version
        id: version
        run: grep ^version= gradle.properties >> $GITHUB_OUTPUT
      - name: Generate Tag Name
        id: tag_name
        run: echo tag=$TAG_NAME >> $GITHUB_OUTPUT
        env:
          TAG_NAME: v${{ steps.version.outputs.version }}
      - name: Check if version was already released
        run: "! git ls-remote -t --exit-code origin $TAG_NAME"
        env:
          TAG_NAME: ${{ steps.tag_name.outputs.tag }}

  tag_release:
    name: Tag Release & Bump Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.triggerRelease && github.ref == 'refs/heads/main'
    needs: [ build, check_metadata, ktlint, lint, android_tests, ios_tests, js_tests, check_version ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Create Tag
        env:
          TAG_NAME: ${{ needs.check_version.outputs.tag }}
        run: |
          git tag $TAG_NAME
          git push origin $TAG_NAME
      - name: Generate next version
        id: bump_version
        uses: actions-ecosystem/action-bump-semver@v1
        with:
          current_version: ${{ needs.check_version.outputs.version }}
          level: patch
      - name: Update version for new development
        run: sed -i "s/version=${{ needs.check_version.outputs.version }}/version=${{ steps.bump_version.outputs.new_version }}/" gradle.properties
      - name: Create Version Bump Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: "versionBump/${{ steps.bump_version.outputs.new_version }}"
          title: "Bump version after release"
          commit-message: "Bump version to ${{steps.bump_version.outputs.new_version}}"

  deploy:
    name: Publish Library
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'Publish PR SNAPSHOT: Maven')) ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs: [ build, check_metadata, ktlint, lint, android_tests, ios_tests, js_tests, check_version ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Publish library
        run: ./gradlew publish -x :publishing:npm:publish --scan
        env:
          ORG_GRADLE_PROJECT_cruGlobalMavenRepositoryUsername: ${{ secrets.JFROG_USERNAME }}
          ORG_GRADLE_PROJECT_cruGlobalMavenRepositoryPassword: ${{ secrets.JFROG_PASSWORD }}

  deploy_ios_podspec:
    name: Publish iOS Podspec
    runs-on: macos-26
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'Publish PR SNAPSHOT: CocoaPods')) ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs: [ build, check_metadata, ktlint, lint, ios_tests, check_version ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Create podspec
        run: ./gradlew podspec
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
      - name: Add CruGlobal CocoaPods Repo
        run: bundle exec pod repo add CruGlobal git@github.com:CruGlobal/cocoapods-specs.git
      - name: Push podspec
        run: bundle exec pod repo push CruGlobal *.podspec --allow-warnings
        env:
          # HACK: Disable Git LFS for this step due to issues with GHA being able to fetch LFS files
          GIT_LFS_SKIP_SMUDGE: 1

  deploy_npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'Publish PR SNAPSHOT: npm')) ||
      (github.event_name == 'workflow_dispatch' && inputs.triggerRelease && github.ref == 'refs/heads/main')
    needs: [ build, check_metadata, ktlint, lint, js_tests, check_version ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Publish package
        run: ./gradlew :publishing:npm:publish --scan
        env:
          ORG_GRADLE_PROJECT_npmPublishTag: ${{ (github.event_name == 'pull_request' && format('pr{0}', github.event.pull_request.number)) || '' }}

  assemble_spm_xcframework:
    name: Assemble XCFramework
    runs-on: macos-15
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'Publish PR SNAPSHOT: SPM')) ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs: [ build, check_metadata, ktlint, ios_tests, check_version ]
    outputs:
      zip_filename: ${{ steps.zip_filename.outputs.value }}
      checksum: ${{ steps.checksum.outputs.value }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v5
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Build XCFramework
        run: ./gradlew assembleGodToolsSharedXCFramework --scan
      - name: Compute effective version
        id: version
        env:
          BASE_VERSION: ${{ needs.check_version.outputs.version }}
          VERSION_SUFFIX: ${{ env.ORG_GRADLE_PROJECT_versionSuffix }}
          RELEASE_BUILD: ${{ env.ORG_GRADLE_PROJECT_releaseBuild }}
        run: |
          if [ "$RELEASE_BUILD" = "true" ]; then
            echo "value=$BASE_VERSION" >> $GITHUB_OUTPUT
          elif [ -n "$VERSION_SUFFIX" ]; then
            echo "value=$BASE_VERSION-$VERSION_SUFFIX" >> $GITHUB_OUTPUT
          else
            echo "value=$BASE_VERSION-SNAPSHOT" >> $GITHUB_OUTPUT
          fi
      - name: Compute zip filename
        id: zip_filename
        run: echo "value=GodToolsShared-${{ steps.version.outputs.value }}.xcframework.zip" >> $GITHUB_OUTPUT
      - name: Zip XCFramework
        working-directory: publishing/spm/build/XCFrameworks/release
        run: zip -r "${{ steps.zip_filename.outputs.value }}" GodToolsShared.xcframework
      - name: Compute checksum
        id: checksum
        working-directory: publishing/spm/build/XCFrameworks/release
        run: echo "value=$(swift package compute-checksum '${{ steps.zip_filename.outputs.value }}')" >> $GITHUB_OUTPUT
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v5
        with:
          disable-auto-build-publish: true
        env:
          JF_URL: 'https://cruglobal.jfrog.io'
          JF_USER: ${{ secrets.JFROG_USERNAME }}
          JF_PASSWORD: ${{ secrets.JFROG_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload XCFramework to JFrog
        working-directory: publishing/spm/build/XCFrameworks/release
        env:
          RELEASE_BUILD: ${{ env.ORG_GRADLE_PROJECT_releaseBuild }}
          ZIP_FILENAME: ${{ steps.zip_filename.outputs.value }}
        run: |
          if [ "$RELEASE_BUILD" = "true" ]; then
            JFROG_REPO="swift-releases-local"
          else
            JFROG_REPO="swift-snapshots-local"
          fi
          jf rt u "$ZIP_FILENAME" "$JFROG_REPO/CruGlobal/GodToolsShared/$ZIP_FILENAME"

  deploy_spm:
    name: Publish SPM Package
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.triggerRelease && github.ref == 'refs/heads/main'
    needs: [ assemble_spm_xcframework, check_version ]
    steps:
      - name: Create Package.swift
        uses: DamianReeves/write-file-action@master
        with:
          path: Package.swift
          contents: |
            // swift-tools-version: 5.9
            // The swift-tools-version declares the minimum version of Swift required to build this package.

            import PackageDescription

            let package = Package(
              name: "GodToolsShared",
              platforms: [
                .iOS(.v16),
              ],
              products: [
                  .library(name: "GodToolsShared", targets: ["GodToolsShared"])
              ],
              dependencies: [],
              targets: [
                  .binaryTarget(
                    name: "GodToolsShared",
                    url: "https://cruglobal.jfrog.io/artifactory/swift-releases-local/CruGlobal/GodToolsShared/${{ needs.assemble_spm_xcframework.outputs.zip_filename }}",
                    checksum: "${{ needs.assemble_spm_xcframework.outputs.checksum }}"
                  )
              ]
            )
          write-mode: overwrite
      - name: Push Package.swift to GodTools Shared Swift Repo
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.GODTOOLS_SHARED_SWIFT_GITHUB_ACCESS_TOKEN }}
        with:
          source_file: Package.swift
          destination_repo: CruGlobal/godtools-shared-swift
          user_email: levi.eggert@cru.org
          user_name: levieggertcru
          commit_message: Update package version ${{ needs.assemble_spm_xcframework.outputs.version }}
      - name: Checkout GodTools Shared Swift Repo
        uses: actions/checkout@v6
        with:
          repository: CruGlobal/godtools-shared-swift
          token: ${{ secrets.GODTOOLS_SHARED_SWIFT_GITHUB_ACCESS_TOKEN }}
      - name: Create Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GODTOOLS_SHARED_SWIFT_GITHUB_ACCESS_TOKEN }}
          TAG_NAME: ${{ needs.check_version.outputs.tag }}
        run: |
          git tag $TAG_NAME
          git push origin $TAG_NAME
