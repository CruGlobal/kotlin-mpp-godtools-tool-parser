name: Build Library

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main, feature/*]
  workflow_dispatch:
    inputs:
      triggerRelease:
        description: 'Release Build'
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.triggerRelease || false }}
  cancel-in-progress: true

permissions:
  id-token: write # Required for OIDC for npm publish
  contents: write # Required for creating a new tag when releasing

env:
  ORG_GRADLE_PROJECT_releaseBuild: ${{ github.event_name == 'workflow_dispatch' && inputs.triggerRelease && github.ref == 'refs/heads/main' }}
  ORG_GRADLE_PROJECT_versionSuffix: >-
    ${{
      (github.event_name == 'pull_request' && format('PR{0}', github.event.pull_request.number)) ||
      ''
    }}

jobs:
  build:
    name: Build
    # run on mac so iOS compilation is executed as well
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Build
        run: ./gradlew assemble --scan

  check_metadata:
    name: Check Publication Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Check Publication Metadata
        run: ./gradlew generateMetadataFileForKotlinMultiplatformPublication --scan

  ktlint:
    name: Ktlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Ktlint
        run: ./gradlew :build-logic:ktlintCheck ktlintCheck --scan
      - name: Archive ktlint results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ktlint-results
          path: "**/build/reports/ktlint/"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Lint
        run: ./gradlew lint --scan

  android_tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          lfs: 'true'
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Cache Maven
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ github.sha }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Run Android Unit Tests
        run: ./gradlew testAndroidHostTest verifyPaparazzi koverXmlReportAndroid --scan --no-build-cache
      - name: Codecov
        uses: codecov/codecov-action@v7
        with:
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-unit-test-results
          path: |
            **/build/paparazzi/failures/
            **/build/reports/tests/
      - name: Archive kover results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kover-results
          path: "**/build/reports/kover/"

  ios_tests:
    name: iOS Unit Tests
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Run iOS Unit Tests
        run: ./gradlew iosSimulatorArm64Test --scan

  js_tests:
    name: JS Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Run JS Unit Tests
        run: ./gradlew jsTest --scan
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: js-unit-test-results
          path: "**/build/reports/tests/"

  check_version:
    name: Check Version is Unreleased
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.tag_name.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Find Version
        id: version
        run: grep ^version= gradle.properties >> $GITHUB_OUTPUT
      - name: Generate Tag Name
        id: tag_name
        run: echo tag=$TAG_NAME >> $GITHUB_OUTPUT
        env:
          TAG_NAME: v${{ steps.version.outputs.version }}
      - name: Check if version was already released
        run: "! git ls-remote -t --exit-code origin $TAG_NAME"
        env:
          TAG_NAME: ${{ steps.tag_name.outputs.tag }}

  tag_release:
    name: Tag Release & Bump Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.triggerRelease && github.ref == 'refs/heads/main'
    needs: [ build, check_metadata, ktlint, lint, android_tests, ios_tests, js_tests, check_version ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Create Tag
        env:
          TAG_NAME: ${{ needs.check_version.outputs.tag }}
        run: |
          git tag $TAG_NAME
          git push origin $TAG_NAME
      - name: Generate next version
        id: bump_version
        uses: actions-ecosystem/action-bump-semver@v1
        with:
          current_version: ${{ needs.check_version.outputs.version }}
          level: patch
      - name: Update version for new development
        run: sed -i "s/version=${{ needs.check_version.outputs.version }}/version=${{ steps.bump_version.outputs.new_version }}/" gradle.properties
      - name: Create Version Bump Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: "versionBump/${{ steps.bump_version.outputs.new_version }}"
          title: "Bump version after release"
          commit-message: "Bump version to ${{steps.bump_version.outputs.new_version}}"

  deploy:
    name: Publish Library
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'Publish PR SNAPSHOT: Maven')) ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs: [ build, check_metadata, ktlint, lint, android_tests, ios_tests, js_tests, check_version ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Publish library
        run: ./gradlew publish -x :publishing:npm:publish --scan
        env:
          ORG_GRADLE_PROJECT_cruGlobalMavenRepositoryUsername: ${{ secrets.JFROG_USERNAME }}
          ORG_GRADLE_PROJECT_cruGlobalMavenRepositoryPassword: ${{ secrets.JFROG_PASSWORD }}

  deploy_npm:
    name: Publish npm package
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'Publish PR SNAPSHOT: npm')) ||
      (github.event_name == 'workflow_dispatch' && inputs.triggerRelease && github.ref == 'refs/heads/main')
    needs: [ build, check_metadata, ktlint, lint, js_tests, check_version ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Publish package
        run: ./gradlew :publishing:npm:publish --scan
        env:
          ORG_GRADLE_PROJECT_npmPublishTag: ${{ (github.event_name == 'pull_request' && format('pr{0}', github.event.pull_request.number)) || '' }}

  deploy_spm:
    name: Publish SPM Package
    runs-on: macos-26
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'Publish PR SNAPSHOT: SPM')) ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    needs: [ build, check_metadata, ktlint, ios_tests, check_version ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version-file: ".tool-versions"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Cache Konan
        uses: actions/cache@v6
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ github.sha }}
          restore-keys: ${{ runner.os }}-konan-

      - name: Assemble SPM Package
        run: ./gradlew assembleGodToolsSharedSpmPackage --scan

      - name: Read zip filename
        id: zip_filename
        run: |
          ZIP_FILENAME=$(basename publishing/spm/build/outputs/spm/GodToolsShared-*.xcframework.zip)
          echo "value=$ZIP_FILENAME" >> $GITHUB_OUTPUT
      - name: Compute checksum
        id: checksum
        working-directory: publishing/spm/build/outputs/spm
        run: echo "value=$(swift package compute-checksum '${{ steps.zip_filename.outputs.value }}')" >> $GITHUB_OUTPUT

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v5
        with:
          disable-auto-build-publish: true
        env:
          JF_URL: 'https://cruglobal.jfrog.io'
          JF_USER: ${{ secrets.JFROG_USERNAME }}
          JF_PASSWORD: ${{ secrets.JFROG_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload XCFramework to JFrog
        id: jfrog_upload
        working-directory: publishing/spm/build/outputs/spm
        env:
          RELEASE_BUILD: ${{ env.ORG_GRADLE_PROJECT_releaseBuild }}
          ZIP_FILENAME: ${{ steps.zip_filename.outputs.value }}
        run: |
          if [ "$RELEASE_BUILD" = "true" ]; then
            JFROG_REPO="swift-releases-local"
            DEST_FILENAME="$ZIP_FILENAME"
          else
            JFROG_REPO="swift-snapshots-local"
            DEST_FILENAME="${ZIP_FILENAME%.xcframework.zip}.${{ github.run_id }}.xcframework.zip"
          fi
          DEST="$JFROG_REPO/CruGlobal/GodToolsShared/$DEST_FILENAME"
          jf rt u "$ZIP_FILENAME" "$DEST"
          echo "url=https://cruglobal.jfrog.io/artifactory/$DEST" >> $GITHUB_OUTPUT

      - name: Checkout GodTools Shared Swift Repo
        uses: actions/checkout@v7
        with:
          repository: CruGlobal/godtools-shared-swift
          ref: main
          ssh-key: ${{ secrets.GODTOOLS_SHARED_SWIFT_SSH_DEPLOY_KEY }}
          path: godtools-shared-swift
      - name: Switch to version branch
        working-directory: godtools-shared-swift
        env:
          BRANCH: ${{ env.ORG_GRADLE_PROJECT_versionSuffix || 'main' }}
        run: git fetch origin "$BRANCH" && git checkout "$BRANCH" || git checkout -b "$BRANCH"
      - name: Update Package.swift
        env:
          XCFRAMEWORK_URL: ${{ steps.jfrog_upload.outputs.url }}
          CHECKSUM: ${{ steps.checksum.outputs.value }}
        run: |
          python3 -c "
          import re, os
          src = 'publishing/spm/build/outputs/spm/Package.swift'
          c = open(src).read()
          c = re.sub(r'path: \"[^\"]*\"', 'url: \"' + os.environ['XCFRAMEWORK_URL'] + '\",\n        checksum: \"' + os.environ['CHECKSUM'] + '\"', c)
          open('godtools-shared-swift/Package.swift', 'w').write(c)
          "
      - name: Commit Package.swift
        env:
          RELEASE_BUILD: ${{ env.ORG_GRADLE_PROJECT_releaseBuild }}
        run: |
          cd godtools-shared-swift
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git add Package.swift
          git commit -m "Update package"
          if [ "$RELEASE_BUILD" = "true" ]; then
            git tag ${{ needs.check_version.outputs.tag }}
          fi
          git push origin HEAD --follow-tags
